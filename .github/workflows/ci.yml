name: Minimal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Protobuf 35
        run: |
          sudo add-apt-repository ppa:protobuf/ppa -y
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler libprotobuf-dev

      - name: Install gRPC and build tools
        run: |
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libgrpc++-dev protobuf-compiler-grpc

      - name: Remove old CMake cache
        run: rm -rf build

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --config Release

      - name: List build directory
        run: ls -al build

      - name: Run tests
        run: |
          echo "Running test_dummy..."
          ls -al build
          file build/test_dummy
          chmod +x build/test_dummy
          ./build/test_dummy || echo "Test failed with exit code $?"
